# Render Blueprint — provisions the backend web service + a free PostgreSQL database in one go.
services:
  - type: web
    name: carbondesk-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: carbondesk-db
          property: connectionString

databases:
  - name: carbondesk-db
    plan: free
